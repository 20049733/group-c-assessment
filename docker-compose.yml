# ============================================================
# docker-compose.yml — Noel Group | EC2 Production Deployment
#
# Services:
#   - app    : Next.js application (port 3000, internal only)
#   - nginx  : Reverse proxy (port 80, public-facing)
#
# Postgres runs on a SEPARATE EC2 instance.
# Set POSTGRES_URL in your .env file to point at that instance.
# ============================================================

services:

  # ----------------------------------------------------------
  # Next.js Application
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noelgroup_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"           # Internal only — Nginx handles public traffic
    networks:
      - noelgroup_net

  # ----------------------------------------------------------
  # Nginx Reverse Proxy
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: noelgroup_nginx
    restart: unless-stopped
    ports:
      - "80:80"          # Expose port 80 to the internet
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - noelgroup_net

networks:
  noelgroup_net:
    driver: bridge
